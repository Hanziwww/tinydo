name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tinydo:
    name: Build TinyDo (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TinyDo ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  build-android:
    name: Build TinyDo Android (aarch64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Initialize Android project
        run: npx tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --target aarch64

      - name: Find and rename APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' -path '*/release/*' | head -1)
          DEST="tinydo-android-arm64-${{ github.ref_name }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-sync-server:
    name: Build sync-server (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: tinydo-sync-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tinydo-sync-windows-amd64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tinydo-sync-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sync-server

      - name: Build sync-server
        run: cargo build --release --manifest-path sync-server/Cargo.toml --target ${{ matrix.target }}

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: cp sync-server/target/${{ matrix.target }}/release/tinydo-sync ${{ matrix.artifact }}

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: cp sync-server/target/${{ matrix.target }}/release/tinydo-sync ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: copy sync-server\target\${{ matrix.target }}\release\tinydo-sync.exe ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
